<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GD Mobile</title>

<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }

/* 📱 MOBILE BUTTON */
#jumpBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    width:80px;
    height:80px;
    border-radius:50%;
    background:#00ffc8;
    opacity:0.7;
    border:none;
    font-size:20px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<button id="jumpBtn">JUMP</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// GAME VARS
let player = {x:150, y:300, w:40, h:40, vel:0};
let obstacles = [];
let particles = [];

let gravity = 0.8;
let speed = 6;
let score = 0;

// LOOP
function loop(){

    ctx.fillStyle = "#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let ground = canvas.height - 100;

    // platform
    ctx.strokeStyle = "#00ffc8";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, ground+40);
    ctx.lineTo(canvas.width, ground+40);
    ctx.stroke();

    // player physics
    player.vel += gravity;
    player.y += player.vel;

    if(player.y > ground){
        player.y = ground;
    }

    // spawn
    if(score % 90 === 0){
        obstacles.push({x:canvas.width, y:ground});
    }

    // obstacles
    for(let i=0;i<obstacles.length;i++){
        let o = obstacles[i];
        o.x -= speed;

        ctx.shadowBlur = 20;
        ctx.shadowColor = "red";
        ctx.fillStyle = "red";

        ctx.beginPath();
        ctx.moveTo(o.x, o.y);
        ctx.lineTo(o.x+20, o.y-60);
        ctx.lineTo(o.x+40, o.y);
        ctx.fill();

        ctx.shadowBlur = 0;

        // collision
        if(player.x+20 > o.x && player.x < o.x+40 && player.y+40 > o.y-10){
            alert("Game Over");
            location.reload();
        }
    }

    // particles
    particles.push({x:player.x, y:player.y+20});

    for(let i=0;i<particles.length;i++){
        let p = particles[i];
        p.x -= speed;
        ctx.fillStyle = "#00ffc8";
        ctx.fillRect(p.x, p.y, 4, 4);
    }

    if(particles.length > 50){
        particles.shift();
    }

    // player
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#00ffc8";
    ctx.fillStyle = "#00ffc8";
    ctx.fillRect(player.x, player.y, 40, 40);
    ctx.shadowBlur = 0;

    score++;
    requestAnimationFrame(loop);
}

// 🎮 JUMP FUNCTION
function jump(){
    if(player.y >= canvas.height-100){
        player.vel = -15;
    }
}

// PC CONTROL
document.addEventListener("keydown", e=>{
    if(e.code==="Space"){
        jump();
    }
});

// 📱 MOBILE TOUCH CONTROL
canvas.addEventListener("touchstart", ()=>{
    jump();
});

// 📱 BUTTON CONTROL
document.getElementById("jumpBtn").addEventListener("touchstart", jump);
document.getElementById("jumpBtn").addEventListener("click", jump);

// START
loop();
</script>

</body>
</html>
